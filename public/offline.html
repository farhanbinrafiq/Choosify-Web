<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choosify — You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000435;
      color: #ffffff;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 48px;
      height: 48px;
      border: 3px solid #FF5B00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .logo-inner {
      width: 18px;
      height: 18px;
      border: 3px solid #FF5B00;
      border-radius: 50%;
    }
    h1 {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #FF5B00;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 32px;
    }
    button {
      background: #FF5B00;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo"><div class="logo-inner"></div></div>
  <h1>You're Offline</h1>
  <p>
    Check your internet connection and try again. 
    Recently viewed products and brands are still available.
  </p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="background:radial-gradient(900px 200px at 15% 0%, hsla(22,100%,50%,0.16), transparent 70%),radial-gradient(700px 200px at 90% 100%, hsla(12,92%,45%,0.12), transparent 70%),rgba(10,10,31,0.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-family:'Inter',system-ui,sans-serif;position:fixed;top:0;left:0;right:0;width:100%;z-index:50;border-bottom:1px solid rgba(255,255,255,0.07)">
  <helmet><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"></helmet>
  <div style="height:64px;display:flex;align-items:center;gap:18px;padding:0 24px">
    <div style="display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0" onClick="{{ goHome }}">
      <svg width="24" height="24" viewBox="0 0 30 30"><circle cx="15" cy="15" r="12.5" fill="none" stroke="#FF5B00" stroke-width="4"/><circle cx="15" cy="15" r="4" fill="#FF5B00"/></svg>
      <span style="font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px;white-space:nowrap">choosify</span>
    </div>
    <div style="flex:1;position:relative;min-width:0">
      <input placeholder="Search Products, Brands, Reviews..." value="{{ query }}" onChange="{{ onQueryChange }}" onKeyDown="{{ onSearchKeyDown }}" style="width:100%;height:42px;border-radius:21px;border:none;padding:0 100px 0 20px;font-size:13px;background:#fff;color:#1A1A2E;box-sizing:border-box;font-family:inherit"/>
      <button onClick="{{ onSearchClick }}" style="position:absolute;right:4px;top:4px;height:34px;padding:0 20px;background:#FF5B00;color:#fff;border:none;border-radius:17px;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.3px">DISCOVER</button>
    </div>
    <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
      <div style="position:relative;cursor:pointer" title="Wishlist" onClick="{{ noop }}">
        <svg width="19" height="19" viewBox="0 0 20 20" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.6"><path d="M10 17s-6.5-4.1-8-8.3C1 5.6 3 3 6 3c1.8 0 3.2 1 4 2.3C10.8 4 12.2 3 14 3c3 0 5 2.6 4 5.7-1.5 4.2-8 8.3-8 8.3z"/></svg>
        <sc-if value="{{ wishlistCount }}"><span style="position:absolute;top:-7px;right:-8px;background:#FF5B00;color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px">{{ wishlistCount }}</span></sc-if>
      </div>
      <div style="position:relative;cursor:pointer" title="Cart" onClick="{{ goCheckout }}">
        <svg width="19" height="19" viewBox="0 0 20 20" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.6"><circle cx="7" cy="17" r="1.3" fill="rgba(255,255,255,0.85)" stroke="none"/><circle cx="15" cy="17" r="1.3" fill="rgba(255,255,255,0.85)" stroke="none"/><path d="M1 2h2l2 11h10l2-8H4"/></svg>
        <sc-if value="{{ cartCount }}"><span style="position:absolute;top:-7px;right:-8px;background:#FF5B00;color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px">{{ cartCount }}</span></sc-if>
      </div>
      <div style="position:relative;cursor:pointer" title="Messages" onClick="{{ goMessages }}">
        <svg width="19" height="19" viewBox="0 0 20 20" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.6"><path d="M2 4h16v10H8l-4 4v-4H2V4z"/></svg>
        <sc-if value="{{ messageCount }}"><span style="position:absolute;top:-7px;right:-8px;background:#FF5B00;color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px">{{ messageCount }}</span></sc-if>
      </div>
      <div style="width:1px;height:22px;background:rgba(255,255,255,0.12)"></div>
      <div style="position:relative">
        <div style="display:flex;align-items:center;gap:7px;cursor:pointer;white-space:nowrap" onClick="{{ toggleProfile }}" title="Account">
          <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FF5B00,#2323FF);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0">{{ userInitial }}</div>
          <div style="font-size:11.5px;color:#fff;font-weight:600">Hi, {{ userName }}</div>
          <span style="font-size:8px;color:rgba(255,255,255,0.5)">▾</span>
        </div>
        <sc-if value="{{ profileOpen }}">
          <div style="position:absolute;top:38px;right:0;background:#fff;border-radius:10px;box-shadow:0 12px 32px rgba(0,0,0,0.22);width:200px;overflow:hidden;z-index:60">
            <div style="padding:14px 16px;background:#F4F7F9;border-bottom:1px solid #E8EDF2">
              <div style="font-size:12.5px;font-weight:700;color:#1A1A2E">{{ userName }} {{ userLastName }}</div>
              <div style="font-size:10.5px;color:#9AA0AC">kamaluddin@gmail.com</div>
            </div>
            <sc-for list="{{ profileMenuItems }}" as="mi" hint-placeholder-count="5">
              <div style="{{ mi.style }}" onClick="{{ mi.onClick }}"><span>{{ mi.icon }}</span>{{ mi.label }}</div>
            </sc-for>
          </div>
        </sc-if>
      </div>
    </div>
  </div>
  <nav style="display:flex;align-items:center;gap:22px;padding:0 24px;height:38px;border-top:1px solid rgba(255,255,255,0.06);overflow-x:auto">
    <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="7">
      <a style="{{ item.style }}" onClick="{{ item.onClick }}">{{ item.label }}</a>
    </sc-for>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { profileOpen: false };
  toggleProfile = () => this.setState(s => ({ profileOpen: !s.profileOpen }));
  renderVals() {
    const active = this.props.active;
    const onNavigate = this.props.onNavigate || (() => {});
    const closeAnd = (key) => () => { this.setState({ profileOpen: false }); onNavigate(key); };
    const menuStyle = { padding: '11px 16px', fontSize: '12px', fontWeight: 600, color: '#1A1A2E', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px', borderBottom: '1px solid #F1F1F3' };
    const profileMenuItems = [
      { icon: '📊', label: 'My Dashboard', onClick: closeAnd('dashboard') },
      { icon: '📦', label: 'My Orders', onClick: closeAnd('orderSuccess') },
      { icon: '♡', label: 'Wishlist', onClick: closeAnd('products') },
      { icon: '💬', label: 'Messages', onClick: closeAnd('messages') },
      { icon: '↪', label: 'Sign Out', onClick: closeAnd('signin'), style: { ...menuStyle, color: '#FF000D', borderBottom: 'none' } },
    ].map(it => ({ ...it, style: it.style || menuStyle }));
    const items = [
      { key: 'home', label: 'Home' },
      { key: 'categories', label: 'Categories' },
      { key: 'products', label: 'Products' },
      { key: 'brands', label: 'Brands' },
      { key: 'discover', label: 'Discover' },
      { key: 'creators', label: 'Creators' },
      { key: 'deals', label: 'Deals' },
      { key: 'compare', label: 'Compare' },
    ];
    const navItems = items.map(it => ({
      key: it.key,
      label: it.label,
      onClick: () => onNavigate(it.key),
      isDiscover: it.key === 'discover',
      style: it.key === 'discover' ? {
        fontSize: '11.5px',
        fontWeight: 800,
        color: '#fff',
        cursor: 'pointer',
        whiteSpace: 'nowrap',
        textDecoration: 'none',
        background: 'linear-gradient(90deg,#6C4CFF,#FF5B00)',
        padding: '5px 14px',
        borderRadius: '999px',
      } : {
        fontSize: '11.5px',
        fontWeight: it.key === active ? 700 : 500,
        color: it.key === active ? '#FF5B00' : 'rgba(255,255,255,0.82)',
        cursor: 'pointer',
        whiteSpace: 'nowrap',
        textDecoration: 'none',
      },
    }));
    return {
      navItems,
      goHome: () => onNavigate('home'),
      goSignIn: () => onNavigate('signin'),
      noop: () => {},
      profileOpen: this.state.profileOpen,
      toggleProfile: this.toggleProfile,
      profileMenuItems,
      userLastName: '',
      query: this.props.query ?? '',
      onQueryChange: (e) => this.props.onQueryChange && this.props.onQueryChange(e.target.value),
      onSearchClick: () => this.props.onSearch && this.props.onSearch(),
      onSearchKeyDown: (e) => { if (e.key === 'Enter' && this.props.onSearch) this.props.onSearch(); },
      cartCount: this.props.cartCount ?? 3,
      wishlistCount: this.props.wishlistCount ?? 12,
      messageCount: this.props.messageCount ?? 7,
      goCheckout: () => onNavigate('checkout'),
      goMessages: () => onNavigate('messages'),
      userName: this.props.userName ?? 'Farhan',
      userInitial: (this.props.userName ?? 'Farhan').charAt(0),
    };
  }
}
</script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Global defaults (crawlers + first paint). PageSeo updates these per route. -->
    <title>Choosify — Bangladesh’s Smartest Product Discovery Platform</title>
    <meta
      name="description"
      content="Compare verified brands, discover trusted products, and shop with confidence on Choosify — Bangladesh's product &amp; service discovery platform."
    />
    <meta name="author" content="Choosify" />
    <meta name="application-name" content="Choosify" />
    <meta name="theme-color" content="#000435" />
    <meta name="msapplication-TileColor" content="#000435" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://www.choosify.bd/" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Choosify" />
    <meta property="og:locale" content="en_BD" />
    <meta property="og:title" content="Choosify — Bangladesh’s Smartest Product Discovery Platform" />
    <meta
      property="og:description"
      content="Compare verified brands, discover trusted products, and shop with confidence on Choosify — Bangladesh's product &amp; service discovery platform."
    />
    <meta property="og:url" content="https://www.choosify.bd/" />
    <meta property="og:image" content="https://www.choosify.bd/og/default.png" />
    <meta property="og:image:secure_url" content="https://www.choosify.bd/og/default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Choosify — buy ORIGINAL" />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@choosifybd" />
    <meta name="twitter:creator" content="@choosifybd" />
    <meta name="twitter:title" content="Choosify — Bangladesh’s Smartest Product Discovery Platform" />
    <meta
      name="twitter:description"
      content="Compare verified brands, discover trusted products, and shop with confidence on Choosify."
    />
    <meta name="twitter:image" content="https://www.choosify.bd/og/default.png" />
    <meta name="twitter:image:alt" content="Choosify — buy ORIGINAL" />

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Choosify" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=6" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=6" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=6" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=6" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=6" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="mask-icon" href="/masked-icon.svg?v=6" color="#FF5B00" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <style>
      html, body {
        scroll-behavior: smooth;
        background-color: #EEF1F8;
        font-family: 'Inter', sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body class="bg-[#EEF1F8] text-[#1A1D4E] min-h-screen flex flex-col antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
